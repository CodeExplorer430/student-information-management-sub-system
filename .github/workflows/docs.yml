name: Docs and Repo Metadata

on:
    pull_request:
        paths:
            - '.github/**'
            - 'README.md'
            - 'CONTRIBUTING.md'
            - 'docs/**'
            - '.markdownlint.jsonc'
    push:
        branches:
            - develop
            - main
            - release/**
            - hotfix/**
        paths:
            - '.github/**'
            - 'README.md'
            - 'CONTRIBUTING.md'
            - 'docs/**'
            - '.markdownlint.jsonc'
    workflow_dispatch:

concurrency:
    group: docs-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    markdown-and-actions:
        name: markdown-and-actions
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Lint GitHub Actions workflows
              uses: rhysd/actionlint@v1

            - name: Lint Markdown
              uses: DavidAnson/markdownlint-cli2-action@v18
              with:
                  config: .markdownlint.jsonc
                  globs: |
                      README.md
                      CONTRIBUTING.md
                      docs/**/*.md
                      .github/**/*.md
