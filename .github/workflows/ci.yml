name: CI

on:
    pull_request:
        branches:
            - develop
            - main
            - release/**
            - hotfix/**
    push:
        branches:
            - develop
            - main
            - release/**
            - hotfix/**
    workflow_dispatch:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    strict-check:
        name: strict-check
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Run strict quality gate in validator
              run: bash scripts/run-validator.sh composer check

            - name: Upload PHPUnit coverage artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: phpunit-coverage
                  path: build/coverage
                  if-no-files-found: error

            - name: Upload acceptance output artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: codeception-output
                  path: tests/_output
                  if-no-files-found: ignore
